<svg viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A89F91" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A89F91" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1a1a2e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Device Shadow -->
  <ellipse cx="100" cy="270" rx="80" ry="10" fill="rgba(0, 0, 0, 0.1)"/>

  <!-- iPhone Frame -->
  <rect x="25" y="15" width="150" height="250" rx="35" fill="url(#frameGrad)"/>
  <rect x="28" y="18" width="144" height="244" rx="30" fill="#000000"/>
  <rect x="75" y="32" width="50" height="22" rx="11" fill="#000000"/>
  <rect x="75" y="32" width="50" height="18" rx="9" fill="url(#screenGrad)" opacity="0.3"/>
  <rect x="75" y="32" width="50" height="22" rx="11" fill="url(#screenGrad)" opacity="0.5"/>

  <!-- Side Button -->
  <rect x="175" y="90" width="6" height="30" rx="3" fill="#2A2A2C" opacity="0.3"/>
  <rect x="175" y="130" width="6" height="25" rx="2.5" fill="#2A2A2C" opacity="0.3"/>

  <!-- Camera Module - Pro only -->
  <rect x="35" y="22" width="32" height="32" rx="6" fill="#2A2A2C"/>
  <circle cx="45" cy="29" r="4" fill="#3A3A3C"/>
  <circle cx="60" cy="29" r="4" fill="#3A3A3C"/>
  <circle cx="42" cy="47" r="4" fill="#3A3A3C"/>
  <rect x="35" y="46" width="32" height="32" rx="6" fill="#000000"/>
</svg>
